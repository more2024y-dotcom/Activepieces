<!DOCTYPE html>
<html>

<head>

<title>Activepieces Create Account</title>

<link rel="stylesheet" href="css/signup.css">

</head>


<body>


<div class="signup-container">


<div class="signup-card">


<img src="assets/logo.png" class="logo">


<h1>
Activepieces
</h1>


<p class="subtitle">
Create Account
</p>




<label>
Username
</label>

<input type="text" id="username" placeholder="Username">

<p id="usernameError" class="error">
Username is required
</p>





<label>
Phone
</label>


<div class="phone-box">


<select id="country">

<option>
+66
</option>

<option>
+95
</option>

<option>
+1
</option>

<option>
+44
</option>

</select>


<input 
type="text" 
id="phone"
placeholder="Enter a phone number"
>


</div>





<label>
Transaction Password
</label>


<input 
type="password" 
id="transactionPassword"
placeholder="Transaction Password"
>


<p id="transactionError" class="error">
Transaction Password is required
</p>






<label>
Login Password
</label>


<input 
type="password" 
id="loginPassword"
placeholder="Login Password"
>







<label>
Gender
</label>


<select id="gender">


<option value="">
Select Gender
</option>


<option>
Male
</option>


<option>
Female
</option>


<option>
Other
</option>


</select>







<label>
Invite Code
</label>


<input 
type="text" 
id="invite"
placeholder="Invite Code"
>







<button onclick="createAccount()">

Create account

</button>






<p class="login-link">

Already have an account?

<br>

<a href="login.html">
Login here
</a>

</p>



</div>


</div>






<script>


function createAccount(){


let username=document.getElementById("username").value;

let phone=document.getElementById("phone").value;

let transaction=document.getElementById("transactionPassword").value;

let password=document.getElementById("loginPassword").value;





if(username==""){

alert("Username is required");

return;

}



if(transaction==""){

alert("Transaction Password is required");

return;

}





localStorage.setItem("username",username);

localStorage.setItem("phone",phone);

localStorage.setItem("transactionPassword",transaction);

localStorage.setItem("password",password);





alert("Account created successfully!");

window.location.href="login.html";


}



</script>



</body>

</html>
