<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Account</title>
    <style>
        :root {
            --primary-color: #0f172a;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #334155;
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }

        .auth-card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
        }

        .auth-card h2 {
            margin-top: 0;
            margin-bottom: 8px;
            color: var(--primary-color);
            font-size: 24px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--primary-color);
            font-size: 13px;
            font-weight: 600;
        }

        .input-group input, 
        .input-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            background-color: #fff;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group input:focus, 
        .input-group select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .phone-row {
            display: flex;
            gap: 8px;
        }

        .phone-row select {
            width: 130px;
            flex-shrink: 0;
        }

        .phone-row input {
            flex-grow: 1;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 8px;
        }

        .submit-btn:hover {
            background-color: var(--accent-hover);
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #64748b;
        }

        .footer-text a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2>Create Account</h2>
        <div class="subtitle">Fill in the details below to register</div>
        
        <form id="signupForm">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" required placeholder="Choose a unique username">
            </div>

            <div class="input-group">
                <label for="phone">Phone</label>
                <div class="phone-row">
                    <select id="countryCode">
                        <option value="+95" selected>+95 (Myanmar)</option>
                        <option value="+1">+1 (USA/Canada)</option>
                        <option value="+44">+44 (UK)</option>
                        <option value="+91">+91 (India)</option>
                        <option value="+86">+86 (China)</option>
                        <option value="+65">+65 (Singapore)</option>
                        <option value="+66">+66 (Thailand)</option>
                        <option value="+84">+84 (Vietnam)</option>
                        <option value="+60">+60 (Malaysia)</option>
                        <option value="+81">+81 (Japan)</option>
                        <option value="+82">+82 (South Korea)</option>
                        <option value="+62">+62 (Indonesia)</option>
                        <option value="+63">+63 (Philippines)</option>
                        <option value="+971">+971 (UAE)</option>
                    </select>
                    <input type="tel" id="phone" required placeholder="Phone number">
                </div>
            </div>

            <div class="input-group">
                <label for="transactionPassword">Transaction Password</label>
                <input type="password" id="transactionPassword" required placeholder="At least 6 characters">
            </div>

            <div class="input-group">
                <label for="loginPassword">Login Password</label>
                <input type="password" id="loginPassword" required placeholder="At least 6 characters">
            </div>

            <div class="input-group">
                <label for="gender">Gender</label>
                <select id="gender" required>
                    <option value="" disabled selected>Select gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="input-group">
                <label for="inviteCode">Invite Code</label>
                <input type="text" id="inviteCode" required placeholder="Enter invite code">
            </div>

            <button type="submit" class="submit-btn">Create account</button>
        </form>

        <div class="footer-text">
            Already have an account?<br>
            <a href="login.html">Login here</a>
        </div>
    </div>

    <script>
        const signupForm = document.getElementById('signupForm');

        signupForm.addEventListener('submit', function(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const phone = document.getElementById('countryCode').value + ' ' + document.getElementById('phone').value.trim();
            const transactionPassword = document.getElementById('transactionPassword').value;
            const loginPassword = document.getElementById('loginPassword').value;
            const inviteCode = document.getElementById('inviteCode').value.trim();

            // 1. Check Invite Code
            if (inviteCode !== "2DI2") {
                alert('Invalid invite code! You must use the code 2DI2 to register.');
                return; 
            }

            // 2. Check if Username already exists in localStorage
            const existingUsername = localStorage.getItem('userName');
            if (existingUsername && existingUsername === username) {
                alert('This username is already taken. Please choose a different username.');
                return;
            }

            // 3. Check Password lengths (at least 6 characters)
            if (transactionPassword.length < 6) {
                alert('Transaction password must be at least 6 characters long.');
                return;
            }

            if (loginPassword.length < 6) {
                alert('Login password must be at least 6 characters long.');
                return;
            }

            // Save user data securely to localStorage
            localStorage.setItem('userName', username);
            localStorage.setItem('userPhone', phone);
            localStorage.setItem('userPassword', loginPassword);
            localStorage.setItem('userTransactionPassword', transactionPassword);

            alert('Account created successfully! Please login.');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
