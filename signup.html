<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Account</title>
    <style>
        :root {
            --primary-color: #0f172a;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #334155;
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }

        .auth-card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 440px;
            box-sizing: border-box;
            position: relative;
        }

        h2 {
            margin-top: 0;
            color: var(--primary-color);
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .phone-group {
            display: flex;
            gap: 10px;
        }

        .phone-group select {
            width: 130px;
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #64748b;
        }

        button.submit-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button.submit-btn:hover {
            background-color: var(--accent-hover);
        }

        .error-msg {
            color: #dc2626;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .switch-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .switch-link a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }

        .switch-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2>Create Account</h2>
        <form id="signupForm">
            
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Choose a username" required>
            </div>

            <!-- Country Phone Number Option -->
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <div class="phone-group">
                    <select id="countryCode">
                        <option value="+1">🇺🇸 +1 (US)</option>
                        <option value="+44">🇬🇧 +44 (UK)</option>
                        <option value="+91">🇮🇳 +91 (IN)</option>
                        <option value="+86">🇨🇳 +86 (CN)</option>
                        <option value="+81">🇯🇵 +81 (JP)</option>
                        <option value="+49">🇩🇪 +49 (DE)</option>
                        <option value="+33">🇫🇷 +33 (FR)</option>
                        <option value="+55">🇧🇷 +55 (BR)</option>
                        <option value="+52">🇲🇽 +52 (MX)</option>
                        <option value="+61">🇦🇺 +61 (AU)</option>
                        <option value="+971">🇦🇪 +971 (UAE)</option>
                        <option value="+27">🇿🇦 +27 (ZA)</option>
                    </select>
                    <input type="tel" id="phone" placeholder="Phone number" required>
                </div>
            </div>

            <!-- Login Password with Eye Toggle -->
            <div class="form-group">
                <label for="password">Login Password</label>
                <div class="password-container">
                    <input type="password" id="password" placeholder="Create login password" required>
                    <button type="button" id="togglePassword" class="toggle-password">👁️</button>
                </div>
            </div>

            <!-- Transaction Password -->
            <div class="form-group">
                <label for="transPassword">Transaction Password</label>
                <div class="password-container">
                    <input type="password" id="transPassword" placeholder="Create transaction password" required>
                    <button type="button" id="toggleTransPassword" class="toggle-password">👁️</button>
                </div>
            </div>

            <div class="form-group">
                <label for="inviteCode">Invite Code</label>
                <input type="text" id="inviteCode" placeholder="Enter invite code (2DI2)" required>
                <div id="inviteError" class="error-msg">Invalid invite code. Please use 2DI2.</div>
            </div>

            <button type="submit" class="submit-btn">Sign Up</button>

            <div class="switch-link">
                Already have an account? <a href="login.html">Log In</a>
            </div>
        </form>
    </div>

    <script>
        // Login Password Visibility Toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', function () {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.textContent = type === 'password' ? '👁️' : '🔒';
            });
        }

        // Transaction Password Visibility Toggle
        const toggleTransPassword = document.getElementById('toggleTransPassword');
        const transPasswordInput = document.getElementById('transPassword');
        if (toggleTransPassword && transPasswordInput) {
            toggleTransPassword.addEventListener('click', function () {
                const type = transPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                transPasswordInput.setAttribute('type', type);
                this.textContent = type === 'password' ? '👁️' : '🔒';
            });
        }

        // Signup & Invite Code Gatekeeper Logic
        const signupForm = document.getElementById('signupForm');
        signupForm.addEventListener('submit', function (e) {
            e.preventDefault();
            
            const inviteCode = document.getElementById('inviteCode').value.trim();
            const inviteError = document.getElementById('inviteError');
            
            if (inviteCode !== '2DI2') {
                inviteError.style.display = 'block';
                return;
            }
            
            inviteError.style.display = 'none';

            // Combine country code and phone number
            const fullPhone = document.getElementById('countryCode').value + ' ' + document.getElementById('phone').value;

            // Save user details including transaction password to localStorage
            localStorage.setItem('userName', document.getElementById('username').value);
            localStorage.setItem('userPhone', fullPhone);
            localStorage.setItem('userPass', passwordInput.value);
            localStorage.setItem('userTransPass', transPasswordInput.value);

            alert('Account created successfully!');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
