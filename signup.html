<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Account</title>
    <style>
        :root {
            --primary-color: #0f172a;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #334155;
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }

        .auth-card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 440px;
            box-sizing: border-box;
            position: relative;
        }

        .language-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }

        .language-header select {
            width: auto;
            padding: 6px 10px;
            font-size: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
        }

        h2 {
            margin-top: 0;
            color: var(--primary-color);
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .phone-group {
            display: flex;
            gap: 10px;
        }

        .phone-group select {
            width: 130px;
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #64748b;
        }

        button.submit-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button.submit-btn:hover {
            background-color: var(--accent-hover);
        }

        .error-msg {
            color: #dc2626;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .switch-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .switch-link a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }

        .switch-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="language-header">
            <select id="languageSelect">
                <option value="en">English</option>
                <option value="es">Español</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="zh">中文</option>
                <option value="ja">日本語</option>
                <option value="hi">हिन्दी</option>
                <option value="ar">العربية</option>
                <option value="pt">Português</option>
                <option value="ru">Русский</option>
                <option value="it">Italiano</option>
                <option value="ko">한국어</option>
            </select>
        </div>

        <h2>Create Account</h2>
        <form id="signupForm">
            
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Choose a username" required>
            </div>

            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" required>
                    <option value="" disabled selected>Select gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <div class="phone-group">
                    <select id="countryCode">
                        <option value="+1">🇺🇸 +1 (US)</option>
                        <option value="+44">🇬🇧 +44 (UK)</option>
                        <option value="+91">🇮🇳 +91 (IN)</option>
                        <option value="+86">🇨🇳 +86 (CN)</option>
                        <option value="+81">🇯🇵 +81 (JP)</option>
                        <option value="+49">🇩🇪 +49 (DE)</option>
                        <option value="+33">🇫🇷 +33 (FR)</option>
                        <option value="+55">🇧🇷 +55 (BR)</option>
                        <option value="+52">🇲🇽 +52 (MX)</option>
                        <option value="+61">🇦🇺 +61 (AU)</option>
                        <option value="+971">🇦🇪 +971 (UAE)</option>
                        <option value="+27">🇿🇦 +27 (ZA)</option>
                    </select>
                    <input type="tel" id="phone" placeholder="Enter phone number" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Login Password</label>
                <div class="password-container">
                    <input type="password" id="password" placeholder="At least 6 characters" required>
                    <button type="button" id="togglePassword" class="toggle-password">👁️</button>
                </div>
            </div>

            <div class="form-group">
                <label for="transPassword">Transaction Password</label>
                <div class="password-container">
                    <input type="password" id="transPassword" placeholder="At least 6 characters" required>
                    <button type="button" id="toggleTransPassword" class="toggle-password">👁️</button>
                </div>
            </div>

            <div class="form-group">
                <label for="inviteCode">Invite Code</label>
                <input type="text" id="inviteCode" placeholder="Enter invite code (2DI2)" required>
                <div id="formError" class="error-msg"></div>
            </div>

            <button type="submit" class="submit-btn">Sign Up</button>

            <div class="switch-link">
                Already have an account? <a href="login.html">Log In</a>
            </div>
        </form>
    </div>

    <script>
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', function () {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.textContent = type === 'password' ? '👁️' : '🔒';
            });
        }

        const toggleTransPassword = document.getElementById('toggleTransPassword');
        const transPasswordInput = document.getElementById('transPassword');
        if (toggleTransPassword && transPasswordInput) {
            toggleTransPassword.addEventListener('click', function () {
                const type = transPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                transPasswordInput.setAttribute('type', type);
                this.textContent = type === 'password' ? '👁️' : '🔒';
            });
        }

        const signupForm = document.getElementById('signupForm');
        signupForm.addEventListener('submit', function (e) {
            e.preventDefault();
            
            const formError = document.getElementById('formError');
            const usernameInput = document.getElementById('username').value.trim();
            const phoneInput = document.getElementById('phone').value.trim();
            const inviteCode = document.getElementById('inviteCode').value.trim();
            const passVal = passwordInput.value;
            const transPassVal = transPasswordInput.value;

            // Check if username already exists in multi-user storage
            let users = JSON.parse(localStorage.getItem('usersList')) || [];
            const existingUser = users.find(u => u.username.toLowerCase() === usernameInput.toLowerCase());
            if (existingUser) {
                formError.textContent = 'This username is already taken. Please choose another one.';
                formError.style.display = 'block';
                return;
            }

            // Phone Number Validation: Check if it contains only numbers and has a valid length (e.g., at least 7 digits)
            const phoneDigitsOnly = phoneInput.replace(/\D/g, '');
            if (phoneDigitsOnly.length < 7) {
                formError.textContent = 'Please enter a valid phone number correctly.';
                formError.style.display = 'block';
                return;
            }

            // Check Login Password length
            if (passVal.length < 6) {
                formError.textContent = 'Login password must be at least 6 characters long.';
                formError.style.display = 'block';
                return;
            }

            // Check Transaction Password length
            if (transPassVal.length < 6) {
                formError.textContent = 'Transaction password must be at least 6 characters long.';
                formError.style.display = 'block';
                return;
            }

            // Check Invite Code
            if (inviteCode !== '2DI2') {
                formError.textContent = 'Invalid invite code. Please use 2DI2.';
                formError.style.display = 'block';
                return;
            }
            
            formError.style.display = 'none';

            const fullPhone = document.getElementById('countryCode').value + ' ' + phoneInput;
            const selectedGender = document.getElementById('gender').value;
            const selectedLang = document.getElementById('languageSelect').value;

            // Create new user object
            const newUser = {
                username: usernameInput,
                gender: selectedGender,
                phone: fullPhone,
                password: passVal,
                transPassword: transPassVal,
                language: selectedLang
            };

            users.push(newUser);
            localStorage.setItem('usersList', JSON.stringify(users));

            alert('Account created successfully!');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
