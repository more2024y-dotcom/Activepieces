<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Account</title>
    <style>
        :root {
            --primary-color: #0f172a;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #334155;
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }

        .auth-card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 440px;
            box-sizing: border-box;
            position: relative;
        }

        /* Language Selector Header Position */
        .language-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }

        .language-header select {
            width: auto;
            padding: 6px 10px;
            font-size: 12px;
        }

        h2 {
            margin-top: 0;
            color: var(--primary-color);
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .phone-group {
            display: flex;
            gap: 10px;
        }

        .phone-group select {
            width: 130px;
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #64748b;
        }

        .strength-meter {
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .strength-text {
            font-size: 12px;
            margin-top: 4px;
            color: #64748b;
        }

        button.submit-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button.submit-btn:hover {
            background-color: var(--accent-hover);
        }

        .error-msg {
            color: #dc2626;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <!-- Language Selector Option -->
        <div class="language-header">
            <select id="languageSelect">
                <option value="en">English</option>
                <option value="es">Español</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="zh">中文</option>
                <option value="ja">日本語</option>
                <option value="hi">हिन्दी</option>
                <option value="ar">العربية</option>
                <option value="pt">Português</option>
                <option value="ru">Русский</option>
                <option value="it">Italiano</option>
                <option value="ko">한국어</option>
            </select>
        </div>

        <h2>Create Account</h2>
        <form id="signupForm">
            
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Choose a username" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <div class="phone-group">
                    <select id="countryCode">
                        <option value="+1">🇺🇸 +1 (US)</option>
                        <option value="+44">🇬🇧 +44 (UK)</option>
                        <option value="+91">🇮🇳 +91 (IN)</option>
                        <option value="+86">🇨🇳 +86 (CN)</option>
                        <option value="+81">🇯🇵 +81 (JP)</option>
                        <option value="+49">🇩🇪 +49 (DE)</option>
                        <option value="+33">🇫🇷 +33 (FR)</option>
                        <option value="+55">🇧🇷 +55 (BR)</option>
                        <option value="+52">🇲🇽 +52 (MX)</option>
                        <option value="+61">🇦🇺 +61 (AU)</option>
                        <option value="+971">🇦🇪 +971 (UAE)</option>
                        <option value="+27">🇿🇦 +27 (ZA)</option>
                    </select>
                    <input type="tel" id="phone" placeholder="Phone number" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-container">
                    <input type="password" id="password" placeholder="Create a password" required>
                    <button type="button" id="togglePassword" class="toggle-password">👁️</button>
                </div>
                <div class="strength-meter">
                    <div id="strengthBar" class="strength-bar"></div>
                </div>
                <div id="strengthText" class="strength-text">Password strength: Enter a password</div>
            </div>

            <div class="form-group">
                <label for="inviteCode">Invite Code</label>
                <input type="text" id="inviteCode" placeholder="Enter invite code (2DI2)" required>
                <div id="inviteError" class="error-msg">Invalid invite code. Please use 2DI2.</div>
            </div>

            <button type="submit" class="submit-btn">Sign Up</button>
        </form>
    </div>

    <script>
        // Password Visibility Toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', function () {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.textContent = type === 'password' ? '👁️' : '🔒';
            });
        }

        // Password Strength Checker
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');

        passwordInput.addEventListener('input', function() {
            const val = passwordInput.value;
            let strength = 0;

            if (val.length >= 6) strength += 1;
            if (val.match(/[A-Z]/)) strength += 1;
            if (val.match(/[0-9]/)) strength += 1;
            if (val.match(/[^a-zA-Z0-9]/)) strength += 1;

            if (val.length === 0) {
                strengthBar.style.width = '0%';
                strengthBar.style.backgroundColor = 'transparent';
                strengthText.textContent = 'Password strength: Enter a password';
            } else if (strength <= 1) {
                strengthBar.style.width = '25%';
                strengthBar.style.backgroundColor = '#dc2626';
                strengthText.textContent = 'Password strength: Weak';
            } else if (strength === 2 || strength === 3) {
                strengthBar.style.width = '65%';
                strengthBar.style.backgroundColor = '#d97706';
                strengthText.textContent = 'Password strength: Medium';
            } else {
                strengthBar.style.width = '100%';
                strengthBar.style.backgroundColor = '#16a34a';
                strengthText.textContent = 'Password strength: Strong';
            }
        });

        // Signup Form Logic
        const signupForm = document.getElementById('signupForm');
        signupForm.addEventListener('submit', function (e) {
            e.preventDefault();
            
            const inviteCode = document.getElementById('inviteCode').value.trim();
            const inviteError = document.getElementById('inviteError');
            
            if (inviteCode !== '2DI2') {
                inviteError.style.display = 'block';
                return;
            }
            
            inviteError.style.display = 'none';

            const fullPhone = document.getElementById('countryCode').value + ' ' + document.getElementById('phone').value;
            const selectedLanguage = document.getElementById('languageSelect').value;

            // Save user details along with their chosen language preference to localStorage
            localStorage.setItem('userName', document.getElementById('username').value);
            localStorage.setItem('userPhone', fullPhone);
            localStorage.setItem('userPass', passwordInput.value);
            localStorage.setItem('userLang', selectedLanguage);

            alert('Account created successfully!');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
