<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>User Dashboard</title>
    <style>
        /* --- MASSIVE MOBILE FORCED-SCALING FIX --- */
        html {
            font-size: 32px !important; /* Forces root scale up massively */
            -webkit-text-size-adjust: 100%;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #fcf6f5;
            color: #222222;
            padding-bottom: 220px;
            overflow-x: hidden;
            font-size: 1.5rem !important; /* ~48px base text */
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .content {
            padding: 50px 40px;
            max-width: 100%;
            margin: 0 auto;
        }

        .home-logo {
            margin-bottom: 50px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }

        .home-logo img {
            max-height: 140px; /* Huge explicit logo size */
            width: auto;
        }

        .home-menu-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px 20px;
            margin-bottom: 60px;
            text-align: center;
        }

        .menu-icon-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #ffffff;
            padding: 35px 15px;
            border-radius: 35px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
        }

        .icon-circle {
            width: 140px;
            height: 140px;
            background-color: #ff334b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 70px; /* Gigantic emojis */
            margin-bottom: 20px;
            box-shadow: 0 15px 35px rgba(255, 51, 75, 0.45);
        }

        .menu-icon-item span:not(.icon-circle span) {
            font-size: 28px !important;
            color: #111111;
            font-weight: 900;
        }

        .vip-banner {
            background: linear-gradient(135deg, #d4af37 0%, #fff2b2 50%, #d4af37 100%);
            border-radius: 35px;
            padding: 45px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.4);
        }

        .vip-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .vip-shield {
            background: #1e3a8a;
            color: #fff;
            width: 110px;
            height: 110px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 40px;
        }

        .vip-banner h2 {
            font-size: 42px !important;
            color: #111;
            font-weight: 900;
        }

        .vip-banner p {
            font-size: 26px !important;
            color: #222 !important;
            margin-top: 10px;
            font-weight: 700;
        }

        .vip-right {
            font-size: 32px !important;
            font-weight: 900;
            color: #111;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .section-header h2 {
            font-size: 40px !important;
            font-weight: 900;
            color: #111;
        }

        .view-more-red {
            background-color: #ff334b;
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 40px;
            font-size: 26px !important;
            font-weight: 900;
            cursor: pointer;
        }

        .gifts-scroll-container {
            display: flex;
            gap: 35px;
            overflow-x: auto;
            padding-bottom: 25px;
            scrollbar-width: none;
        }

        .gifts-scroll-container::-webkit-scrollbar {
            display: none;
        }

        .gift-card-horizontal {
            background: #ffffff;
            border: 2px solid #eaeaea;
            border-radius: 35px;
            min-width: 380px;
            max-width: 380px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        .gift-card-horizontal img {
            width: 260px;
            height: 260px;
            object-fit: contain;
            margin-bottom: 25px;
        }

        .gift-card-horizontal h3 {
            font-size: 32px !important;
            font-weight: 900;
            color: #222;
            text-align: center;
            margin-bottom: 25px;
            height: auto;
        }

        .points-badge {
            background-color: #ff334b;
            color: white;
            padding: 20px 30px;
            border-radius: 20px;
            font-size: 28px !important;
            font-weight: 900;
            text-align: center;
            width: 100%;
        }

        .realtime-section {
            margin-top: 60px;
        }

        .realtime-section h2 {
            font-size: 40px !important;
            font-weight: 900;
            margin-bottom: 25px;
            color: #111;
        }

        .heatmap-card {
            background: #ffffff;
            border: 2px solid #eaeaea;
            border-radius: 35px;
            padding: 40px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
        }

        .heatmap-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 30px !important;
            font-weight: 900;
            color: #222;
            background: #f8f9fa;
            padding: 25px 35px;
            border-radius: 20px;
            margin-bottom: 35px;
        }

        .fake-chart {
            height: 260px;
            width: 100%;
            position: relative;
            background: linear-gradient(to bottom, rgba(255, 51, 75, 0.15), transparent);
            border-radius: 20px;
            overflow: hidden;
        }

        .chart-curve {
            position: absolute;
            bottom: -30px;
            left: -10%;
            width: 120%;
            height: 180px;
            border-top: 8px solid #ff334b;
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #000000;
            display: flex;
            justify-content: space-around;
            padding: 25px 0;
            z-index: 1000;
            box-shadow: 0 -12px 35px rgba(0,0,0,0.4);
        }

        .bottom-nav a {
            text-align: center;
            color: #888;
            font-size: 24px !important;
            font-weight: 900;
            flex: 1;
        }

        .bottom-nav a.active {
            color: #ff334b;
        }

        .bottom-nav a span {
            display: block;
            font-size: 50px !important; /* Huge bottom navigation icons */
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="content">
        <!-- Logo Header -->
        <div class="home-logo">
            <img src="assets/logo.png" alt="Logo">
        </div>

        <!-- Top Menu Icons Grid (8 items) -->
        <div class="home-menu-grid">
            <div class="menu-icon-item">
                <div class="icon-circle">🏠</div>
                <span>Home</span>
            </div>
            <div class="menu-icon-item">
                <div class="icon-circle">⭐</div>
                <span>VIP</span>
            </div>
            <div class="menu-icon-item">
                <div class="icon-circle">📋</div>
                <span>Tasks</span>
            </div>
            <div class="menu-icon-item">
                <div class="icon-circle">💳</div>
                <span>Withdraw</span>
            </div>
            <div class="menu-icon-item">
                <div class="icon-circle">💰</div>
                <span>Deposit</span>
            </div>
            <div class="menu-icon-item">
                <div class="icon-circle">🎁</div>
                <span>Gifts</span>
            </div>
            <div class="menu-icon-item">
                <div class="icon-circle">📊</div>
                <span>Records</span>
            </div>
            <div class="menu-icon-item">
                <div class="icon-circle">⚙️</div>
                <span>Settings</span>
            </div>
        </div>

        <!-- VIP Banner Card -->
        <div class="vip-banner">
            <div class="vip-left">
                <div class="vip-shield">VIP</div>
                <div>
                    <h2>VIP Member</h2>
                    <p>Active status verified</p>
                </div>
            </div>
            <div class="vip-right">Level 1</div>
        </div>

        <!-- Selected Gifts Section -->
        <div class="section-header">
            <h2>Selected Gifts</h2>
            <button class="view-more-red">View More</button>
        </div>

        <div class="gifts-scroll-container">
            <div class="gift-card-horizontal">
                <img src="assets/ipad.png" alt="iPad Pro">
                <h3>Apple iPad Pro</h3>
                <div class="points-badge">60 Points</div>
            </div>
            <div class="gift-card-horizontal">
                <img src="assets/phone.png" alt="Phone">
                <h3>iPhone 14 Pro</h3>
                <div class="points-badge">80 Points</div>
            </div>
        </div>

        <!-- Real-Time Heatmap Section -->
        <div class="realtime-section">
            <h2>Daily Progress</h2>
            <div class="heatmap-card">
                <div class="heatmap-header">
                    <span>Task Completion Rate</span>
                    <span style="color: #ff334b;">100%</span>
                </div>
                <div class="fake-chart">
                    <div class="chart-curve"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <a href="home.html" class="active">
            <span>🏠</span>
            HOME
        </a>
        <a href="certificate.html">
            <span>🏆</span>
            CERTIFICATE
        </a>
        <a href="start.html">
            <span>🚀</span>
            START
        </a>
        <a href="records.html">
            <span>📋</span>
            RECORDS
        </a>
        <a href="profile.html">
            <span>👤</span>
            MY
        </a>
    </nav>

    <script src="dashboard.js?v=12"></script>
</body>
</html>
