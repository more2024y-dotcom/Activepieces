<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Task - Blue Theme</title>
    <style>
        :root {
            --primary-blue: #1d4ed8;
            --blue-gradient-start: #1e40af;
            --blue-gradient-end: #3b82f6;
            --bg-color: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            padding-bottom: 50px;
        }
        .top-bar {
            background-color: #e11d48;
            color: white;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        .container {
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }
        .product-title {
            font-size: 13px;
            color: var(--text-main);
            margin-bottom: 10px;
        }
        .image-card {
            background: #fff5f5;
            border: 1px solid #fee2e2;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
        }
        .image-card img {
            max-width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }
        .dots {
            text-align: center;
            font-size: 20px;
            margin-top: 10px;
            color: #cbd5e1;
        }
        .price-section {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }
        .price-amount {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 15px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 15px;
        }
        .comment-label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .stars {
            color: #000000;
            font-size: 16px;
            cursor: pointer;
        }
        .stars.active {
            color: #eab308;
        }
        .comment-box {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            padding: 12px;
            min-height: 90px;
            position: relative;
            margin-bottom: 15px;
        }
        .comment-text {
            font-size: 13px;
            color: var(--text-main);
            outline: none;
            border: none;
            width: 100%;
            background: transparent;
            resize: none;
        }
        .auto-comment-btn {
            background: #eab308;
            color: #000;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 4px;
            position: absolute;
            bottom: 10px;
            right: 10px;
            cursor: pointer;
            border: none;
        }
        .vip-banner-box {
            background: #fef08a;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            color: #854d0e;
        }
        .stats-table {
            background: white;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            padding: 12px;
            font-size: 12px;
            margin-bottom: 15px;
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .stats-row:last-child {
            margin-bottom: 0;
        }
        .stats-val {
            font-weight: 700;
        }
        .meta-card {
            background: white;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            padding: 12px;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 25px;
        }
        .meta-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        .meta-row:last-child {
            margin-bottom: 0;
        }
        .btn-submit {
            width: 100%;
            background: #e11d48;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 4px 12px rgba(225, 29, 72, 0.3);
        }
        .btn-submit:hover {
            background: #be123c;
        }
    </style>
</head>
<body>

    <div class="top-bar" onclick="history.back()">
        &lt;
    </div>

    <div class="container">
        <div class="product-title" id="productTitleDisplay">CD button skirt pants</div>

        <div class="image-card">
            <img id="productImg" src="https://images.unsplash.com/photo-1583496661160-fb5886a0aaaa?auto=format&fit=crop&w=400&q=80" alt="Product">
            <div class="dots">•</div>
        </div>

        <div class="price-section">USD</div>
        <div class="price-amount" id="priceDisplay">901.00 x1</div>

        <div class="comment-label-row">
            <span>Click to write a comment:</span>
            <div class="stars" id="starContainer" onclick="fillRandomComment()">★★★★★</div>
        </div>

        <div class="comment-box">
            <textarea class="comment-text" id="commentInput" placeholder="Click automatic comment or type here..."></textarea>
            <button class="auto-comment-btn" onclick="fillRandomComment()">Automatic Comment</button>
        </div>

        <div class="vip-banner-box">
            <span>🛡️</span> VIP 1
        </div>

        <div class="stats-table">
            <div class="stats-row">
                <span>Total Amount</span>
                <span>Reward</span>
                <span>Earnings</span>
            </div>
            <div class="stats-row stats-val" style="color: var(--text-main); font-size: 13px; margin-top: 4px;">
                <span id="statAmount">901.00(USD)</span>
                <span>0.5%</span>
                <span id="statEarnings">45.05(USD)</span>
            </div>
        </div>

        <div class="meta-card">
            <div class="meta-row">
                <span>Date Created</span>
                <span id="dateCreated">2026-07-17 17:27:34</span>
            </div>
            <div class="meta-row">
                <span>Order Code</span>
                <span id="orderCode">2026071717270000034</span>
            </div>
        </div>

        <button class="btn-submit" onclick="submitOrder()">Submit</button>
    </div>

    <script>
        // Load active order details passed from task.html
        const orderName = localStorage.getItem('currentOrderName') || "CD button skirt pants";
        const orderImg = localStorage.getItem('currentOrderImg') || "https://images.unsplash.com/photo-1583496661160-fb5886a0aaaa?auto=format&fit=crop&w=400&q=80";
        const orderPrice = parseFloat(localStorage.getItem('currentOrderPrice')) || 901.00;
        const orderEarnings = parseFloat(localStorage.getItem('currentOrderEarnings')) || 4.51;

        document.getElementById('productTitleDisplay').textContent = orderName;
        document.getElementById('productImg').src = orderImg;
        document.getElementById('priceDisplay').textContent = orderPrice.toFixed(2) + ' x1';
        document.getElementById('statAmount').textContent = orderPrice.toFixed(2) + '(USD)';
        document.getElementById('statEarnings').textContent = orderEarnings.toFixed(2) + '(USD)';

        // Timestamp generator
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        
        document.getElementById('dateCreated').textContent = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        document.getElementById('orderCode').textContent = `${year}${month}${day}${hours}${minutes}${Math.floor(10000 + Math.random() * 90000)}`;

        // Dynamic distinct review banks for different product types
        const reviewPools = {
            clothing: [
                "The fabric feels amazing and fits wonderfully!",
                "Stitching is neat and high quality. Very pleased.",
                "Beautiful color and true to size. Highly recommended!",
                "Comfortable to wear all day long. Great style."
            ],
            gadgets: [
                "Works seamlessly right out of the box. Super fast!",
                "Excellent build quality and great battery life.",
                "Very practical design, completely met my expectations.",
                "Top-tier performance, worth every penny."
            ],
            general: [
                "Fast shipping and item matched the description perfectly.",
                "Extremely satisfied with this purchase experience.",
                "Exceeded expectations, will definitely buy again.",
                "Wonderful product quality and lovely packaging."
            ]
        };

        function fillRandomComment() {
            document.getElementById('starContainer').classList.add('active');
            
            // Pick review based on item name keywords
            let selectedPool = reviewPools.general;
            const lowerName = orderName.toLowerCase();
            if(lowerName.includes('shirt') || lowerName.includes('skirt') || lowerName.includes('pants') || lowerName.includes('shoes') || lowerName.includes('jacket')) {
                selectedPool = reviewPools.clothing;
            } else if(lowerName.includes('phone') || lowerName.includes('camera') || lowerName.includes('watch') || lowerName.includes('headphone')) {
                selectedPool = reviewPools.gadgets;
            }

            const randomReview = selectedPool[Math.floor(Math.random() * selectedPool.length)];
            document.getElementById('commentInput').value = randomReview;
        }

        function submitOrder() {
            const comment = document.getElementById('commentInput').value;
            if (!comment) {
                alert('Please select an automatic comment or write a review first!');
                return;
            }

            // 1. Return principal order price + 0.5% commission earnings back to user balance
            let currentBalance = parseFloat(localStorage.getItem('userBalance')) || 2000.00;
            currentBalance += (orderPrice + orderEarnings);
            localStorage.setItem('userBalance', currentBalance);

            // 2. Increment completed task count (e.g., from 17 to 18 out of 40)
            let completedTasks = parseInt(localStorage.getItem('completedTasksCount')) || 17;
            completedTasks += 1;
            if (completedTasks > 40) completedTasks = 40;
            localStorage.setItem('completedTasksCount', completedTasks);

            // Clear temporary pending flag
            localStorage.removeItem('taskPending');

            alert('Order submitted successfully! Commission credited to account.');
            window.location.href = 'task.html';
        }
    </script>

</body>
</html>
