<!DOCTYPE html>
<html>

<head>

<title>Activepieces Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css?v=5">

</head>


<body>


<div class="dashboard">


<!-- Sidebar -->

<aside class="sidebar">


<div class="brand">

<img src="assets/logo.png" alt="Activepieces Logo">

</div>



<ul>

<li>🏠 Home</li>

<li onclick="openVIP()">
⭐ VIP
</li>

<li>
🎉 Event
</li>

<li>
💰 Withdrawal
</li>

<li>
💳 Deposit
</li>

<li>
🎁 Gifts
</li>

<li>
📜 Records
</li>

</ul>


</aside>





<!-- Main Content -->

<main class="content">



<header>


<h1>User Dashboard</h1>



<div class="profile">


<img src="assets/logo.png" alt="Profile">


<span id="username">
Welcome
</span>


</div>


</header>





<section class="stats">



<div class="box">

<h3>Daily Tasks</h3>

<p id="total">
0
</p>

</div>





<div class="box">

<h3>Completed</h3>

<p id="completed">
0
</p>

</div>





<div class="box">

<h3>Remaining</h3>

<p id="remaining">
0
</p>

</div>



</section>







<h2 class="title">
Today's Tasks
</h2>





<div class="progress-section">


<h2>
Daily Progress
</h2>



<div class="progress-bar">

<div id="progress"></div>

</div>



<p id="progress-text">
0% Completed
</p>


</div>






<!-- Tasks -->

<div class="tasks">

</div>






<button class="logout" onclick="logout()">

Logout

</button>



</main>


</div>








<!-- Supabase -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>



<!-- Connection -->

<script src="js/supabase.js?v=5"></script>




<!-- Dashboard -->

<script src="js/dashboard.js?v=5"></script>




<!-- User Tasks -->

<script src="js/user-task.js?v=5"></script>






<script>


let user = localStorage.getItem("user");



if(user){

document.getElementById("username").innerHTML =
"Welcome, " + user;

}




function logout(){

localStorage.removeItem("user");

window.location.href="login.html";

}


</script>


<nav class="bottom-nav">

<a href="home.html">
<span>🏠</span>
HOME
</a>


<a href="certificate.html">
<span>🏆</span>

</a>


<a href="start.html">
<span>🚀</span>

</a>


<a href="records.html">
<span>📋</span>

</a>


<a href="profile.html">
<span>👤</span>
MY
</a>

</nav>
</body>

</html>
