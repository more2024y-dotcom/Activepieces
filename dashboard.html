<!DOCTYPE html>
<html>

<head>

<title>Activepieces Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css">

</head>


<body>


<div class="dashboard">



<!-- Sidebar -->

<aside class="sidebar">


<div class="brand">

<img src="assets/logo.png" alt="Activepieces Logo">

</div>



<ul>

<li>🏠 Dashboard</li>

<li>📋 Tasks</li>

<li>⚡ Automation</li>

<li>👥 Team</li>

<li>⚙ Settings</li>

</ul>



</aside>





<!-- Main Content -->

<main class="content">



<header>


<h1>User Dashboard</h1>



<div class="profile">


<img src="assets/logo.png" alt="Profile">


<span id="username">

Welcome

</span>


</div>


</header>






<!-- Statistics -->


<section class="stats">



<div class="box">

<h3>Daily Tasks</h3>

<p id="total">

0

</p>


</div>





<div class="box">


<h3>Completed</h3>


<p id="completed">

0

</p>


</div>






<div class="box">


<h3>Remaining</h3>


<p id="remaining">

0

</p>


</div>



</section>









<h2 class="title">

Today's Tasks

</h2>







<!-- Progress -->


<div class="progress-section">


<h2>

Daily Progress

</h2>



<div class="progress-bar">


<div id="progress">

</div>


</div>



<p id="progress-text">

0% Completed

</p>


</div>







<!-- Tasks From Supabase -->

<div class="tasks">


</div>







<button class="logout" onclick="logout()">

Logout

</button>





</main>



</div>









<!-- Supabase Library -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>



<!-- Supabase Connection -->

<script src="js/supabase.js"></script>




<!-- Dashboard Logic -->

<script src="js/dashboard.js"></script>




<!-- Task Logic -->

<script src="js/user-task.js"></script>





<script>


let user = localStorage.getItem("user");



if(user){


document.getElementById("username").innerHTML =

"Welcome, " + user;


}




function logout(){


localStorage.removeItem("user");


window.location.href="login.html";


}



</script>



</body>


</html>
