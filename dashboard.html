<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <style>
        :root {
            --primary-color: #0f172a;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #334155;
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .dashboard-card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 480px;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            color: var(--primary-color);
        }

        .welcome-msg {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--accent-color);
        }

        .info-box {
            background-color: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .info-box p {
            margin: 8px 0;
            font-size: 14px;
        }

        .info-box span {
            font-weight: 600;
            color: var(--primary-color);
        }

        button.logout-btn {
            width: 100%;
            padding: 12px;
            background-color: #dc2626;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button.logout-btn:hover {
            background-color: #b91c1c;
        }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <h2>Dashboard</h2>
        <div class="welcome-msg" id="welcomeUser">Welcome back!</div>

        <div class="info-box">
            <p><strong>Username:</strong> <span id="displayUser">Loading...</span></p>
            <p><strong>Phone Number:</strong> <span id="displayPhone">Loading...</span></p>
        </div>

        <button type="button" class="logout-btn" id="logoutBtn">Log Out</button>
    </div>

    <script>
        // Load data from localStorage
        const storedUser = localStorage.getItem('userName');
        const storedPhone = localStorage.getItem('userPhone');

        if (storedUser) {
            document.getElementById('welcomeUser').textContent = `Welcome back, ${storedUser}!`;
            document.getElementById('displayUser').textContent = storedUser;
            document.getElementById('displayPhone').textContent = storedPhone ? storedPhone : 'Not provided';
        } else {
            // If someone tries to access dashboard without logging in, kick them back to login
            alert('Please log in first.');
            window.location.href = 'login.html';
        }

        // Logout functionality
        document.getElementById('logoutBtn').addEventListener('click', function() {
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
