<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Activepieces</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0b0b0f;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: #141419;
            border: 2px solid #2a2a35;
            border-radius: 35px;
            padding: 50px 35px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .logo-container {
            margin-bottom: 30px;
        }

        .logo-container img {
            width: 90px;
            height: 90px;
            border-radius: 20px;
            object-fit: contain;
        }

        .login-card h1 {
            font-size: 34px;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .login-card p {
            font-size: 20px;
            color: #888895;
            margin-bottom: 40px;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group input {
            width: 100%;
            background: #1e1e26;
            border: 2px solid #333342;
            border-radius: 20px;
            padding: 22px 25px;
            font-size: 20px;
            color: #ffffff;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: #ff334b;
        }

        .input-group input::placeholder {
            color: #666675;
        }

        .login-btn {
            width: 100%;
            background-color: #ff334b;
            color: white;
            border: none;
            padding: 22px;
            border-radius: 20px;
            font-size: 22px;
            font-weight: 900;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 10px 25px rgba(255, 51, 75, 0.4);
            transition: background-color 0.2s;
        }

        .login-btn:hover {
            background-color: #e0283f;
        }

        .footer-links {
            margin-top: 35px;
            font-size: 18px;
            color: #888895;
        }

        .footer-links a {
            color: #ff334b;
            text-decoration: none;
            font-weight: 900;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-container">
            <img src="assets/logo.png" alt="Logo">
        </div>
        <h1>Activepieces</h1>
        <p>Login to your account</p>

        <form>
            <div class="input-group">
                <input type="text" placeholder="Username" required>
            </div>
            <div class="input-group">
                <input type="password" placeholder="Password" required>
            </div>
            <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="footer-links">
            Don't have an account? <a href="signup.html">Create Account</a>
        </div>
    </div>

</body>
</html>
