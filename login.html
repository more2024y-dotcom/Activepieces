<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <style>
        :root {
            --primary-color: #0f172a;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #334155;
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .auth-card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
            position: relative;
        }

        /* Language Switcher Styling */
        .lang-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .lang-select {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-color);
        }

        .auth-card h2 {
            margin-top: 0;
            margin-bottom: 8px;
            color: var(--primary-color);
            font-size: 24px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--primary-color);
            font-size: 13px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .submit-btn:hover {
            background-color: var(--accent-hover);
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #64748b;
        }

        .footer-text a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <!-- Language Switcher Dropdown -->
        <div class="lang-container">
            <select id="languageSelect" class="lang-select">
                <option value="en">🇺🇸 English</option>
                <option value="es">🇪🇸 Español</option>
                <option value="fr">🇫🇷 Français</option>
                <option value="ja">🇯🇵 日本語</option>
                <option value="sv">🇸🇪 Svenska</option>
                <option value="it">🇮🇹 Italiano</option>
                <option value="de">🇩🇪 Deutsch</option>
                <option value="no">🇳🇴 Norsk</option>
                <option value="ru">🇷🇺 Русский</option>
                <option value="hu">🇭🇺 Magyar</option>
                <option value="pl">🇵🇱 Polski</option>
                <option value="sk">🇸🇰 Slovenčina</option>
            </select>
        </div>

        <h2 id="textTitle">Welcome Back</h2>
        <div id="textSubtitle" class="subtitle">Please enter your details to log in</div>
        
        <form id="loginForm">
            <div class="input-group">
                <label id="labelUsername" for="username">Username</label>
                <input type="text" id="username" required placeholder="Enter your username">
            </div>
            
            <div class="input-group">
                <label id="labelPassword" for="password">Login Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>

            <button type="submit" id="btnSubmit" class="submit-btn">Log In</button>
        </form>

        <div class="footer-text">
            <span id="textFooterQuestion">Don't have an account?</span><br>
            <a href="signup.html" id="textFooterLink">Sign up</a>
        </div>
    </div>

    <script>
        // Translations Dictionary for Login Page
        const translations = {
            en: {
                title: "Welcome Back", subtitle: "Please enter your details to log in",
                username: "Username", password: "Login Password",
                submit: "Log In", question: "Don't have an account?", link: "Sign up"
            },
            es: {
                title: "Bienvenido de Nuevo", subtitle: "Por favor ingrese sus datos para iniciar sesión",
                username: "Nombre de usuario", password: "Contraseña de inicio de sesión",
                submit: "Iniciar Sesión", question: "¿No tienes una cuenta?", link: "Regístrate"
            },
            fr: {
                title: "Bon Retour", subtitle: "Veuillez entrer vos coordonnées pour vous connecter",
                username: "Nom d'utilisateur", password: "Mot de passe de connexion",
                submit: "Se Connecter", question: "Vous n'avez pas de compte ?", link: "Inscrivez-vous"
            },
            ja: {
                title: "おかえりなさい", subtitle: "ログイン情報を入力してください",
                username: "ユーザー名", password: "ログインパスワード",
                submit: "ログイン", question: "アカウントをお持ちですか？", link: "新規登録"
            },
            sv: {
                title: "Välkommen Tillbaka", subtitle: "Ange dina uppgifter för att logga in",
                username: "Användarnamn", password: "Inloggningslösenord",
                submit: "Logga In", question: "Har du inget konto?", link: "Registrera dig"
            },
            it: {
                title: "Bentornato", subtitle: "Inserisci i tuoi dati per accedere",
                username: "Nome utente", password: "Password di accesso",
                submit: "Accedi", question: "Non hai un account?", link: "Registrati"
            },
            de: {
                title: "Willkommen Zurück", subtitle: "Bitte geben Sie Ihre Daten ein, um sich anzumelden",
                username: "Benutzername", password: "Anmelde-Passwort",
                submit: "Anmelden", question: "Haben Sie kein Konto?", link: "Registrieren"
            },
            no: {
                title: "Velkommen Tilbake", subtitle: "Vennligst skriv inn opplysningene dine for å logge inn",
                username: "Brukernavn", password: "Innloggingspassord",
                submit: "Logg Inn", question: "Har du ikke en konto?", link: "Registrer deg"
            },
            ru: {
                title: "С Возвращением", subtitle: "Пожалуйста, введите данные для входа",
                username: "Имя пользователя", password: "Пароль для входа",
                submit: "Войти", question: "Нет аккаунта?", link: "Зарегистрироваться"
            },
            hu: {
                title: "Üdv Újra", subtitle: "Kérjük, adja meg adatait a bejelentkezéshez",
                username: "Felhasználónév", password: "Bejelentkezési jelszó",
                submit: "Bejelentkezés", question: "Nincs még fiókja?", link: "Regisztráció"
            },
            pl: {
                title: "Witaj Ponownie", subtitle: "Wprowadź swoje dane, aby się zalogować",
                username: "Nazwa użytkownika", password: "Hasło logowania",
                submit: "Zaloguj Się", question: "Nie masz konta?", link: "Zarejestruj się"
            },
            sk: {
                title: "Vitajte Späť", subtitle: "Zadajte svoje údaje na prihlásenie",
                username: "Používateľské meno", password: "Prihlasovacie heslo",
                submit: "Prihlásiť sa", question: "Nemáte účet?", link: "Zaregistrujte sa"
            }
        };

        // Language Switcher Logic
        const languageSelect = document.getElementById('languageSelect');
        
        languageSelect.addEventListener('change', function() {
            const lang = this.value;
            const t = translations[lang];

            document.getElementById('textTitle').innerText = t.title;
            document.getElementById('textSubtitle').innerText = t.subtitle;
            document.getElementById('labelUsername').innerText = t.username;
            document.getElementById('labelPassword').innerText = t.password;
            document.getElementById('btnSubmit').innerText = t.submit;
            document.getElementById('textFooterQuestion').innerText = t.question;
            document.getElementById('textFooterLink').innerText = t.link;
        });

        // Login Authentication Logic
        const loginForm = document.getElementById('loginForm');

        loginForm.addEventListener('submit', function(event) {
            event.preventDefault();

            const enteredUsername = document.getElementById('username').value.trim();
            const enteredPassword = document.getElementById('password').value;

            const savedUsername = localStorage.getItem('userName');
            const savedPassword = localStorage.getItem('userPassword');

            if (enteredUsername === savedUsername && enteredPassword === savedPassword) {
                localStorage.setItem('isLoggedIn', 'true');
                alert('Login successful! Welcome back.');
                window.location.href = 'dashboard.html';
            } else {
                alert('Invalid username or password. Please try again.');
            }
        });
    </script>
</body>
</html>
