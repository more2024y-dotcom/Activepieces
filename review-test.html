<!DOCTYPE html>
<html>

<head>

<title>Automatic Review Test</title>

<style>

body{

    background:#080808;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:40px;

}


.product-card{

    background:#151515;
    border:1px solid #333;
    border-radius:20px;
    padding:25px;
    max-width:350px;
    margin:auto;

}



.product-card img{

    width:200px;
    height:200px;
    object-fit:contain;

}



.gold-btn{

    margin-top:20px;

    width:100%;

    padding:15px;

    border:none;

    border-radius:15px;

    background:
    linear-gradient(
        90deg,
        #d4af37,
        #ffd700
    );

    color:black;

    font-weight:bold;

    cursor:pointer;

}



.stars{

    color:#ffd700;

    font-size:35px;

    margin:15px;

}


.review{

    background:#222;

    padding:15px;

    border-radius:15px;

    margin-top:15px;

}


</style>


</head>



<body>



<div class="product-card">


<img src="assets/products/iphone.png">


<h2>
iPhone 14 Plus
</h2>


<p>
Order Price: $600
</p>


<button class="gold-btn" onclick="automaticReview()">

🟡 AUTOMATIC REVIEW

</button>



<div id="review-area">


</div>



</div>





<script>


let stars = 4;



function automaticReview(){


if(stars > 0){

stars--;

}



let starText="";


for(let i=0;i<stars;i++){

starText += "★";

}


for(let i=stars;i<5;i++){

starText += "☆";

}




document.getElementById("review-area").innerHTML = `


<div class="stars">

${starText}

</div>


<div class="review">

"Excellent product quality, fast delivery and good experience."

</div>


`;


}


</script>



</body>

</html>
